version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: curriculo-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: curriculo_db
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d curriculo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: curriculo-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/curriculo_db
    ports:
      - "8010:8000"
    volumes:
      - ../data:/app/data
      - ../app:/app/app
      - ../alembic:/app/alembic
      - ../scripts:/app/scripts

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: curriculo-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8010/api/v1
    depends_on:
      - app

volumes:
  postgres_data:
